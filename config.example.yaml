# ticketGangster 設定檔
# 複製成 config.yaml 後再修改

# ----------------------------------------------------------------------
# 目標場次
# ----------------------------------------------------------------------
event:
  # 活動頁 URL（KKTIX）
  # 範例:
  #   https://kwan.kktix.cc/events/754b7611       (G-DRAGON / K-SPARK)
  #   https://globalmusic.kktix.cc/events/5dee326c (Engelbert 測試場)
  url: "https://globalmusic.kktix.cc/events/5dee326c"

  # 開賣時間 (本地時區: Asia/Taipei) — 格式 YYYY-MM-DD HH:MM:SS
  # G-DRAGON 場: 2026-05-11 12:00:00
  # Engelbert 場: 2026-05-07 12:00:00
  sale_start: "2026-05-11 12:00:00"

# ----------------------------------------------------------------------
# 票券選擇
# ----------------------------------------------------------------------
ticket:
  # 想搶的票價 (NT$ 數字) — 系統會自動依此挑出對應票種
  # 例如: 8880, 7880, 6880, 5880, 4880, 3880, 2880
  price: 4500

  # 數量 (1~4)
  quantity: 2

  # 備援票價 (依優先序排列) — 主票價搶不到時自動嘗試
  # 留空陣列 [] 代表不使用備援
  fallback_prices: [4000, 3500]

# ----------------------------------------------------------------------
# 搶票策略
# ----------------------------------------------------------------------
strategy:
  # 提前多少秒打開活動頁面預熱（建立 TLS、cookie）
  prewarm_seconds: 60

  # 啟售前多少毫秒開始攻擊（refresh / 點擊）
  attack_lead_ms: 200

  # 每次刷新間隔 (ms)
  refresh_interval_ms: 150

  # 同時開幾個分頁衝（1~5；越多越吃 CPU/網路，但成功率更高）
  parallel_tabs: 1

  # 是否使用伺服器時間校準（推薦 true）
  use_server_time: true

  # 搶到後是否自動勾「我已閱讀並同意」這類 checkbox
  auto_agree: true

  # 搶到後是否自動點「下一步 / 確認」按鈕送出表單
  auto_submit: true

# ----------------------------------------------------------------------
# 瀏覽器設定
# ----------------------------------------------------------------------
browser:
  # 持久化使用者資料夾 (登入狀態存這裡)
  user_data_dir: "./profile"

  # 是否 headless (一定要 false，使用者要在付款頁接手)
  headless: false

  # 視窗大小
  viewport:
    width: 1280
    height: 900

# ----------------------------------------------------------------------
# 通知 (搶到票時)
# ----------------------------------------------------------------------
notify:
  # 是否在搶到票時播放系統提示音
  beep: true
